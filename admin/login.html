<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم | EGAS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin-body rtl">
<div class="admin-login-page">
    <div class="login-bg-glow"></div>
    <div class="admin-login-box">
        <div class="login-header">
            <img src="../img/logo.png" alt="EGAS Logo" class="admin-login-logo">
            <h2>لوحة تحكم <span>EGAS</span></h2>
            <p>أدخل بيانات الاعتماد للوصول إلى مركز الإدارة</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">اسم المستخدم</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" class="form-input" id="username" placeholder="أدخل اسم المستخدم" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">كلمة المرور</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-input" id="password" placeholder="أدخل كلمة المرور" required>
                    <button type="button" id="togglePwd" class="pwd-toggle"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            
            <div id="loginError" class="login-error-msg">
                <i class="fas fa-exclamation-triangle"></i>
                <span>بيانات الدخول غير صحيحة، يرجى المحاولة مرة أخرى</span>
            </div>
            
            <button type="submit" class="btn btn-primary login-submit">
                <span>دخول الآمن</span>
                <i class="fas fa-arrow-left"></i>
            </button>
        </form>
        
        <div class="login-footer">
            <p>المستخدم الافتراضي: <span>admin</span></p>
            <p>كلمة المرور: <span>egas2026</span></p>
        </div>
    </div>
</div>
<script>
document.getElementById('togglePwd').addEventListener('click',function(){
var p=document.getElementById('password');
var i=this.querySelector('i');
if(p.type==='password'){p.type='text';i.classList.replace('fa-eye','fa-eye-slash');}
else{p.type='password';i.classList.replace('fa-eye-slash','fa-eye');}
});
document.getElementById('loginForm').addEventListener('submit',function(e){
e.preventDefault();
var u=document.getElementById('username').value;
var p=document.getElementById('password').value;
if(u==='admin'&&p==='egas2026'){
localStorage.setItem('egasAdmin','true');
window.location.href='dashboard.html';
}else{
document.getElementById('loginError').style.display='flex';
document.getElementById('loginError').style.alignItems='center';
document.getElementById('loginError').style.gap='6px';
}
});
</script>
</body></html>
